name: exam1
description: Flutter Comic Reader App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Animation
  animate_do: ^3.3.4

  # Networking API
  dio: ^5.4.0
  http: ^1.2.0

  # State Management
  flutter_bloc: ^8.1.3

  # Dependency Injection
  get_it: ^7.7.0

  # Routing
  auto_route: ^7.8.4

  # Local Database
  sqflite: ^2.3.3
  path: ^1.9.0

  # Cache Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Settings Storage
  shared_preferences: ^2.2.3

  # AI ML Kit
  google_mlkit_text_recognition: ^0.11.0

  # JSON Model
  json_annotation: ^4.9.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Image
  image_picker: ^0.8.7+4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  auto_route_generator: ^7.3.1

flutter:

  uses-material-design: true

  assets:
    - .env
    